version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: opexsales-db
    environment:
      POSTGRES_DB: opexsales
      POSTGRES_USER: opexsales_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opexsales_user -d opexsales"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opexsales-network

volumes:
  postgres_data:
    driver: local

networks:
  opexsales-network:
    driver: bridge
